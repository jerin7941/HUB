<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Premium Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.4);
      --card-border: rgba(255, 255, 255, 0.6);
      --card-hover: rgba(255, 255, 255, 0.8);
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Abstract Background Blobs - Provides a stunning dynamic glow */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.4;
      animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(to right, #ffb6ff, #b344ff);
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 500px;
      height: 500px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      bottom: -200px;
      right: -100px;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: linear-gradient(to right, #f6d365, #fda085);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
      opacity: 0.3;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(50px, 30px) scale(1.1);
      }

      100% {
        transform: translate(-30px, 50px) scale(0.9);
      }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    h1 {
      text-align: center;
      margin-bottom: 70px;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
      animation: appear 1s ease-out;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category {
      margin-bottom: 80px;
      animation: fadeUp 1s ease-out backwards;
    }

    .category:nth-child(3) {
      animation-delay: 0.2s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 30px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .category-title::before {
      content: "";
      display: block;
      width: 50px;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, transparent);
      border-radius: 2px;
    }

    .links-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
    }

    .site-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px 20px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
      /* Lighter shadow */
    }

    /* Subtle glowing inner border */
    .site-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      transition: opacity 0.4s ease;
    }

    .site-card:hover {
      transform: translateY(-12px);
      background: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.12), 0 0 20px rgba(255, 255, 255, 0.5);
    }

    .site-card:hover::after {
      opacity: 1;
    }

    .img-wrapper {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      background: #ffffff;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      position: relative;
      z-index: 1;
    }

    .site-card:hover .img-wrapper {
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }

    .site-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: filter 0.3s;
    }

    .site-card span {
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }

    /* Ambient colored glow behind icons based on their parent hover */
    .site-card .img-wrapper::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: inherit;
      filter: blur(20px);
      z-index: -1;
      opacity: 0;
      border-radius: inherit;
      transition: opacity 0.4s ease;
    }

    .site-card:hover .img-wrapper::before {
      opacity: 0.6;
    }

    /* Mobile responsive adjustments */
    @media (max-width: 768px) {
      h1 {
        font-size: 3rem;
        margin-bottom: 40px;
      }

      .links-container {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 15px;
      }

      .site-card {
        padding: 25px 15px 20px;
      }

      .img-wrapper {
        width: 65px;
        height: 65px;
        border-radius: 16px;
      }

      .category-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <!-- Animated Mesh Gradient Background Elements -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="container">
    <h1>Your's Hub</h1>

    <div class="category">
      <h2 class="category-title">Social Media</h2>
      <div class="links-container">
        <a href="https://www.youtube.com" target="_blank" class="site-card" style="--glow-color: #FF0000;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube">
          </div>
          <span>YouTube</span>
        </a>

        <a href="https://www.instagram.com" target="_blank" class="site-card" style="--glow-color: #E4405F;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://cdn.simpleicons.org/instagram/E4405F" alt="Instagram">
          </div>
          <span>Instagram</span>
        </a>

        <a href="https://web.whatsapp.com" target="_blank" class="site-card" style="--glow-color: #25D366;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://cdn.simpleicons.org/whatsapp/25D366" alt="WhatsApp">
          </div>
          <span>WhatsApp</span>
        </a>

        <a href="https://twitter.com" target="_blank" class="site-card" style="--glow-color: #111111;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://cdn.simpleicons.org/x/000000" alt="X">
          </div>
          <span>X</span>
        </a>

        <a href="https://www.facebook.com" target="_blank" class="site-card" style="--glow-color: #1877F2;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://cdn.simpleicons.org/facebook/1877F2" alt="Facebook">
          </div>
          <span>Facebook</span>
        </a>
      </div>
    </div>

    <div class="category">
      <h2 class="category-title">Shopping</h2>
      <div class="links-container">
        <a href="https://www.amazon.in" target="_blank" class="site-card" style="--glow-color: #FF9900;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=amazon.in&sz=128" alt="Amazon" style="width: 80%;">
          </div>
          <span>Amazon</span>
        </a>

        <a href="https://www.flipkart.com" target="_blank" class="site-card" style="--glow-color: #2874F0;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=flipkart.com&sz=128" alt="Flipkart" style="width: 80%;">
          </div>
          <span>Flipkart</span>
        </a>

        <a href="https://www.meesho.com" target="_blank" class="site-card" style="--glow-color: #f72c74;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/Meesho_Logo_Full.png" alt="Meesho"
              style="height: auto; width: 100%;">
          </div>
          <span>Meesho</span>
        </a>

        <a href="https://www.myntra.com" target="_blank" class="site-card" style="--glow-color: #FF3F6C;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=myntra.com&sz=128" alt="Myntra" style="width: 80%;">
          </div>
          <span>Myntra</span>
        </a>

        <a href="https://www.zeptonow.com" target="_blank" class="site-card" style="--glow-color: #3b0060;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=zeptonow.com&sz=128" alt="Zepto" style="width: 80%;">
          </div>
          <span>Zepto</span>
        </a>

        <a href="https://www.swiggy.com/instamart" target="_blank" class="site-card" style="--glow-color: #FC8019;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=swiggy.com&sz=128" alt="Instamart" style="width: 80%;">
          </div>
          <span>Instamart</span>
        </a>

        <a href="https://blinkit.com" target="_blank" class="site-card" style="--glow-color: #F8CB46;">
          <div class="img-wrapper" style="background-color: #ffffff;">
            <img src="https://www.google.com/s2/favicons?domain=blinkit.com&sz=128" alt="Blinkit" style="width: 80%;">
          </div>
          <span>Blinkit</span>
        </a>
      </div>
    </div>
  </div>

</body>

</html>
